<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global Diabetes Predictor</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root{ --bg1:#667eea; --bg2:#764ba2; --card:#ffffff; --text:#111; --muted:#6b7280; --accent:#667eea;}
*{box-sizing:border-box;}
body{ margin:0; font-family:Inter,Arial,sans-serif; color:#fff; background: linear-gradient(135deg,var(--bg1),var(--bg2)); min-height: 100vh;}
.wrap{max-width:520px; margin:40px auto; padding:0 14px;}
.card{ background:var(--card); color:var(--text); border-radius:18px; padding:22px 20px 20px; box-shadow:0 18px 40px rgba(0,0,0,.25);}
h2{margin:6px 0 14px; text-align:center;}
.group{margin-bottom:14px; text-align:left;}
label{font-weight:600; display:block; margin-bottom:6px;}
.hint{font-size:12px; color:var(--muted); margin-bottom:6px;}
input[type=number]{ width:100%; padding:12px; border-radius:10px; border:1px solid #d1d5db; outline:none; font-size: 16px;}
.row{display:flex; gap:14px; flex-wrap:wrap;}
.row .opt{display:flex; align-items:center; gap:6px; margin-right:8px; cursor: pointer;}
.section-title{ margin:10px 0 6px; font-weight:700; color:#374151;}
button{ width:100%; margin-top:10px; padding:13px; border:none; border-radius:12px; background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition: background 0.3s;}
button:hover { background: #5a67d8; }
button:disabled { background: #9ca3af; cursor: not-allowed; }
#resultBox { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 18px; transition: all 0.3s ease;}
.footer{ margin-top:15px; text-align:center; font-size:12px; color:#e5e7eb; opacity: 0.8;}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h2>Cloud Diabetes Predictor</h2>
    
    <div class="group"><label>Age</label><div class="hint">Range: 0 to 120 years</div><input type="number" id="age"></div>
    <div class="group"><label>BMI</label><div class="hint">Range: 10 to 60</div><input type="number" id="bmi"></div>
    <div class="group"><label>HbA1c Level</label><div class="hint">Range: 3.0 to 15.0</div><input type="number" id="hba1c"></div>
    <div class="group"><label>Blood Glucose Level (mg/dL)</label><div class="hint">Range: 50 to 300</div><input type="number" id="glucose"></div>
    
    <div class="group"><div class="section-title">Gender</div><div class="row">
      <label class="opt"><input type="radio" name="gender" value="1" checked> Male</label>
      <label class="opt"><input type="radio" name="gender" value="0"> Female</label></div></div>
      
    <div class="group"><div class="section-title">Smoking History</div><div class="row">
      <label class="opt"><input type="radio" name="smoking" value="0" checked> Never</label>
      <label class="opt"><input type="radio" name="smoking" value="1"> Former</label>
      <label class="opt"><input type="radio" name="smoking" value="2"> Current</label></div></div>
      
    <div class="group"><div class="section-title">Hypertension</div><div class="row">
      <label class="opt"><input type="radio" name="hyper" value="0" checked> No</label>
      <label class="opt"><input type="radio" name="hyper" value="1"> Yes</label></div></div>
      
    <div class="group"><div class="section-title">Heart Disease</div><div class="row">
      <label class="opt"><input type="radio" name="heart" value="0" checked> No</label>
      <label class="opt"><input type="radio" name="heart" value="1"> Yes</label></div></div>

    <button id="predictBtn" onclick="sendToFirebase()">Calculate Risk</button>

    <div id="resultBox">Waiting for ESP32...</div>
  </div>
  <div class="footer">Connected globally via Firebase • Powered by ESP32</div>
</div>

<script>
  // 🔥 YOUR FIREBASE CONFIGURATION
 // 🔥 YOUR FULL FIREBASE CONFIGURATION
  const firebaseConfig = {
    apiKey: "AIzaSyAwVLi7VjU0uGx5w5wvgFauCYiUiPaPQm0",
    authDomain: "diabetes-predictor-b8d76.firebaseapp.com",
    databaseURL: "https://diabetes-predictor-b8d76-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "diabetes-predictor-b8d76",
    storageBucket: "diabetes-predictor-b8d76.firebasestorage.app",
    messagingSenderId: "1034372661485",
    appId: "1:1034372661485:web:1ea6ce118d7a855d5ecce4"
  };
  
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const btn = document.getElementById('predictBtn');
  const resultBox = document.getElementById('resultBox');

  function sendToFirebase() {
    // UI Updates during calculation
    btn.disabled = true;
    btn.innerText = "Processing...";
    resultBox.style.display = 'block';
    resultBox.innerText = "Sending data to ESP32...";
    resultBox.style.backgroundColor = "#f3f4f6";
    resultBox.style.color = "#4b5563";

    // Gather inputs
    const data = {
      age: parseFloat(document.getElementById('age').value) || 0,
      bmi: parseFloat(document.getElementById('bmi').value) || 0,
      hba1c: parseFloat(document.getElementById('hba1c').value) || 0,
      glucose: parseFloat(document.getElementById('glucose').value) || 0,
      gender: parseFloat(document.querySelector('input[name="gender"]:checked').value),
      smoking: parseFloat(document.querySelector('input[name="smoking"]:checked').value),
      hyper: parseFloat(document.querySelector('input[name="hyper"]:checked').value),
      heart: parseFloat(document.querySelector('input[name="heart"]:checked').value)
    };

    // Push data to Firebase and flip the trigger switch
    db.ref('/app/inputs').set(data).then(() => {
      db.ref('/app/trigger').set(true);
    }).catch((error) => {
      alert("Error connecting to database: " + error);
      btn.disabled = false;
      btn.innerText = "Calculate Risk";
    });
  }

  // Listen for the ESP32 to finish calculating and reset the trigger
  db.ref('/app/trigger').on('value', (snapshot) => {
    // When trigger goes back to false, it means ESP32 is done
    if (snapshot.val() === false) {
      db.ref('/app/result').once('value').then((resSnap) => {
        const isDiabetic = resSnap.val();
        
        // Return UI to normal
        btn.disabled = false;
        btn.innerText = "Calculate Again";
        
        // Show result
        if(isDiabetic === 1) {
          resultBox.innerText = "High Risk (Diabetic)";
          resultBox.style.backgroundColor = "#dc2626"; // Red
          resultBox.style.color = "#fff";
        } else if (isDiabetic === 0) {
          resultBox.innerText = "Low Risk (Not Diabetic)";
          resultBox.style.backgroundColor = "#16a34a"; // Green
          resultBox.style.color = "#fff";
        }
      });
    }
  });
</script>

</body>
</html>
